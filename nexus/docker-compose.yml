# ============================================================
# Nexus 3 个人私有 Maven 仓库（最简版）
# ============================================================
# 端口: 8081（让内网穿透能访问）
# 数据: nexus-data volume（重启不丢）
#
# 使用：
#   docker compose up -d
#   等 1-2 分钟，访问 http://localhost:8081
# ============================================================

services:
  nexus:
    image: sonatype/nexus3:3.69.0
    container_name: nexus
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - nexus-data:/nexus-data
    environment:
      - INSTALL4J_ADD_VM_PARAMS=-Xms1g -Xmx1g

volumes:
  nexus-data:
    name: nexus-data